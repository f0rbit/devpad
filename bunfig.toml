# @f0rbit/lint's umbrella model relies on transitive bins (oxlint, oxfmt,
# eslint) surfacing in node_modules/.bin -- bun's isolated linker doesn't
# hoist them. See ~/dev/lint AGENTS.md.
[install]
linker = "hoisted"

[test]
# Global setup for integration tests - starts single shared server
preload = ["./tests/integration/setup.ts"]

# Exclude golden Playwright specs from ambient bun test runs
exclude = ["**/tests/golden/**"]

# Coverage configuration
coverageSkipTestFiles = true
coveragePathIgnorePatterns = [
	"**/tests/**",
	"**/node_modules/**",
	"**/*.config.*",
	"**/*.test.*",
	"**/*.spec.*",
	"tests/shared/**",
	"tests/integration/**",
]
coverageReporter = ["text", "lcov"]
coverageDir = "coverage"
